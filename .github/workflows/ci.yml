name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            repo_studio:
              - 'apps/repo-studio/**'
              - 'packages/repo-studio/**'
              - 'packages/repo-studio-extension-adapters/**'
              - 'packages/shared/**'
              - 'packages/types/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            forge_loop:
              - 'packages/forge-loop/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            forge_env:
              - 'packages/forge-env/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

      - name: Init required submodule
        run: |
          git submodule sync -- vendor/repo-studio-extensions
          git submodule update --init --depth 1 vendor/repo-studio-extensions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version from packageManager in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify packageManager pin
        shell: bash
        run: |
          node -e "const cp=require('node:child_process');const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const pm=String(pkg.packageManager||'');if(!pm.startsWith('pnpm@')){console.error('package.json packageManager must be pnpm@<version>');process.exit(1);}const expected=pm.slice('pnpm@'.length);const actual=cp.execSync('pnpm --version',{encoding:'utf8'}).trim();if(actual!==expected){console.error('pnpm version mismatch: expected '+expected+', got '+actual);process.exit(1);}console.log('pnpm version verified:',actual);"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Semantic Guards
        run: |
          pnpm guard:assistant-canonical

      - name: Restore RepoStudio Next.js cache
        if: steps.changes.outputs.repo_studio == 'true'
        uses: actions/cache@v4
        with:
          path: apps/repo-studio/.next/cache
          key: ${{ runner.os }}-repo-studio-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-repo-studio-next-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: RepoStudio App Build
        if: steps.changes.outputs.repo_studio == 'true'
        run: pnpm --filter @forge/repo-studio-app build

      - name: RepoStudio App Lint
        if: steps.changes.outputs.repo_studio == 'true'
        run: pnpm --filter @forge/repo-studio-app lint

      - name: RepoStudio Package Tests
        if: steps.changes.outputs.repo_studio == 'true'
        run: pnpm --filter @forge/repo-studio test

      - name: Forge Loop Tests
        if: steps.changes.outputs.forge_loop == 'true'
        run: pnpm --filter @forge/forge-loop test

      - name: Forge Env Tests
        if: steps.changes.outputs.forge_env == 'true'
        run: pnpm --filter @forge/forge-env test

      - name: CI scope summary
        if: always()
        run: |
          echo "repo_studio=${{ steps.changes.outputs.repo_studio }}"
          echo "forge_loop=${{ steps.changes.outputs.forge_loop }}"
          echo "forge_env=${{ steps.changes.outputs.forge_env }}"
